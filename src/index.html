<!doctype html>
<!--
  src/index.html
  Root HTML shell for the Aethra renderer process.
  electron-vite uses this as the renderer entry point and injects
  the bundled scripts automatically. The root is src/, so paths
  are relative to that directory.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aethra</title>
  </head>
  <body>
    <!-- React mounts into this div -->
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
